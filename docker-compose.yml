services:
  mysql:
    image: mysql:8.4
    container_name: transitops-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-transitops}
      MYSQL_USER: ${MYSQL_USER:-transitops}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-transitops}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./TransitOps_backend
    container_name: transitops-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-transitops}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-transitops}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-transitops}
    ports:
      - "8081:8080"

  frontend:
    build:
      context: ./TransitOps_frontend
    container_name: transitops-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8081
    ports:
      - "5173:5173"

volumes:
  mysql_data:
